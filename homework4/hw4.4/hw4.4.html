<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Document</title>
    <style>
        *{
            position: relative;
            margin: 0;
        }
        header{
            position : relative;
            height: 5vh;
            background: #D9D9D9;
            display: flex;
            align-items: center;
            justify-content: center;

        }
        footer{
            margin-top: 15vh;
            position: relative;
            height: 10vh;
            background: #D9D9D9;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        main {
            display: flex;
        }
        .card{
            transform: scaleY(3.1);
            transform-origin: top;
            margin-bottom: 42vh;
            position: relative;
            height: 28vh;
            width: 30vw;
            background: #A4A4A4;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        aside{
            transform: scaleY(3.1);
            transform-origin: top;
            margin-bottom: 42vh;
            position: relative;
            height: 28vh;
            width: 30vw;
            background: #C1C1C1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .gray{
            transform: scaleX(2);
            transform-origin: left;
            position: relative;
            top: 0;
            height: 45vh;
            width: 40vw;
            background: #7F7A7A;
        }
        .brown{
            transform: scaleX(2);
            transform-origin: right;
            position: relative;
            top: 45vh;
            height: 45vh;
            width: 40vw;
            background: #615050;
        }
    </style>
</head>
<body>
<header></header>
<main>
    <aside class="card"></aside>
    <aside></aside>
    <section class="gray"></section>
    <section class="brown"></section>
</main>
<footer></footer>


</body>
</html>
